server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php index.html;

    # ─── Logs ──────────────────────────────
    access_log /var/log/nginx/pcc_access.log;
    error_log  /var/log/nginx/pcc_error.log;

    # ─── Laravel routing ───────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── PHP-FPM ───────────────────────────
    # Résolution DNS dynamique de l'upstream (DNS interne Docker) pour éviter
    # une IP mise en cache si le conteneur php-fpm est recréé/redémarré.
    location ~ \.php$ {
        resolver 127.0.0.11 valid=10s;
        set $upstream_app app:9000;
        fastcgi_pass   $upstream_app;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    # ─── Security ──────────────────────────
    location ~ /\.ht {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }
}
