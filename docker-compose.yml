services:

  # ─────────────────────────────────────────
  # 🐘 PHP-FPM — Laravel 13
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: pcc_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./laravel:/var/www # ton code Laravel ici
      - pcc_laravel_vendor:/var/www/vendor
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    networks:
      - pcc_network
    depends_on:
      db:
        condition: service_healthy

  # ─────────────────────────────────────────
  # 🌐 Nginx — Web Server
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: pcc_nginx
    restart: unless-stopped
    ports:
      - "8000:80" # http://localhost:8000
    volumes:
      - ./laravel:/var/www
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - pcc_network
    depends_on:
      - app

  # ─────────────────────────────────────────
  # 🗄️ PostgreSQL — Base de données
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: pcc_postgres
    restart: unless-stopped
    ports:
      - "5432:5432" # accès depuis TablePlus / DBeaver / Adminer
    environment:
      POSTGRES_DB: pcc_fidelite
      POSTGRES_USER: pcc_user
      POSTGRES_PASSWORD: pcc_password_2026
    volumes:
      - pcc_postgres_data:/var/lib/postgresql/data # données persistantes
    networks:
      - pcc_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pcc_user -d pcc_fidelite" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # ⚡ Redis — Cache & Queues
  # ─────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: pcc_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - pcc_network

  # ─────────────────────────────────────────
  # � Node.js — Vite Dev Server
  # ─────────────────────────────────────────
  node:
    image: node:22-alpine
    container_name: pcc_node
    working_dir: /var/www
    volumes:
      - ./laravel:/var/www
    ports:
      - "5173:5173" # http://localhost:5173 (Vite HMR)
    command: sh -c "npm install && npm run dev"
    networks:
      - pcc_network

  # ─────────────────────────────────────────
  # �📡 Laravel Reverb — WebSocket Server
  # ─────────────────────────────────────────
  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: pcc_reverb
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
    ports:
      - "8080:8080" # ws://localhost:8080
    volumes:
      - ./laravel:/var/www
      - pcc_laravel_vendor:/var/www/vendor
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    networks:
      - pcc_network
    depends_on:
      db:
        condition: service_healthy

# ─────────────────────────────────────────
# 💾 Volumes & Networks
# ─────────────────────────────────────────
volumes:
  pcc_postgres_data:
    driver: local
  pcc_laravel_vendor:
    driver: local

networks:
  pcc_network:
    driver: bridge
